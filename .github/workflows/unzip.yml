name: Unzip
on:
  push:
    paths:
      - '**.zip'

jobs:
  unzip:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Unzip files
        run: |
          mkdir -p extracted
          for file in *.zip; do
            unzip "$file" -d extracted/
            rm "$file"
          done

      - name: Auto commit extracted files
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Auto extract zip files
          file_pattern: extracted/*
